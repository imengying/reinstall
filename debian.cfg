#_preseed_V1
# shellcheck disable=SC1091,SC2148
# https://www.debian.org/releases/stable/amd64/apbs04.zh-cn.html
# https://www.debian.org/releases/stable/example-preseed.txt
# https://preseed.debian.net/debian-preseed/trixie/amd64-main-full.txt

# B.4.1. 本地化
d-i debian-installer/locale string en_US
d-i keyboard-configuration/xkb-keymap select us

# B.4.2. 网络设置
d-i netcfg/get_hostname string unassigned-hostname
d-i netcfg/get_domain string unassigned-domain
d-i netcfg/hostname string localhost

# B.4.3. 网络控制台

# B.4.4. 镜像设置
d-i mirror/country string manual
# d-i mirror/http/hostname string deb.debian.org

# B.4.5. 帐号设置
d-i passwd/make-user boolean false
# 单纯为了跳过设置，实际上是在 partman/early_command 里设置密码，preseed/early_command 无法设置密码
# 注意如果用 ssh key 后面还要删除密码
d-i passwd/root-password password ''
d-i passwd/root-password-again password ''
d-i passwd/root-login boolean true

# B.4.6. 时钟与时区设置
d-i time/zone string Asia/Shanghai

# B.4.7. 分区
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# vm 原有系统是 bios + gpt，切换成 efi，需要确认此项
# 用脚本重装的话，强制安装在第二个硬盘上也可能会遇到？
d-i partman-efi/non_efi_system boolean true

### Description: Do you want to return to the partitioning menu?
#   You have not selected any partitions for use as swap space. Enabling swap
#   space is recommended so that the system can make better use of the
#   available physical memory, and so that it behaves better when physical
#   memory is scarce. You may experience installation problems if you do not
#   have enough physical memory.
#   .
#   If you do not go back to the partitioning menu and assign a swap partition,
#   the installation will continue without swap space.
# 坑的一比
# 不是确认是否 no_swap
# 而是 recipe no_swap 时，确认是否返回上一级重新分区
# 选择 true 就一直死循环
d-i partman-basicfilesystems/no_swap boolean false

# 最小值 膨胀权重 最大值
# https://salsa.debian.org/installer-team/partman-auto/-/blob/master/recipes/atomic?ref_type=heads
# https://salsa.debian.org/installer-team/partman-auto/-/blob/master/recipes-amd64-efi/atomic?ref_type=heads
# shellcheck disable=SC1083,SC2086,SC2154
d-i partman-auto/expert_recipe_efi string efi :: \
    106 1 106 free \
    $iflabel{ gpt } method{ efi } format{ } . \
    1 1 -1 btrfs \
    method{ format } format{ } use_filesystem{ } filesystem{ btrfs } options{ compress=zstd,noatime } mountpoint{ / } .

# shellcheck disable=SC1083,SC2086,SC2154
d-i partman-auto/expert_recipe_bios string bios :: \
    1 1 1 free \
    $iflabel{ gpt } method{ biosgrub } . \
    1 1 -1 btrfs \
    method{ format } format{ } use_filesystem{ } filesystem{ btrfs } options{ compress=zstd,noatime } mountpoint{ / } .

# B.4.8. 基本系统安装

# B.4.9. 设置 apt
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/enable-source-repositories boolean false
d-i apt-setup/security_host string security.debian.org

# B.4.10. 选择软件包
tasksel tasksel/first multiselect ssh-server
d-i pkgsel/include string curl systemd-timesyncd
d-i pkgsel/upgrade select none

# B.4.11. 安装 bootloader
# 添加 bootx64.efi
d-i grub-installer/force-efi-extra-removable boolean true

# B.4.12. 完成安装
d-i finish-install/reboot_in_progress note


# B.5.1. 安装过程中运行用户命令
# 注意所有命令都会合并成一行命令

# 最后的 true; \ 没什么用，只是让 vscode 代码高亮不报错误

# 有 /cdrom/simple-cdd 才安装 simple-cdd-profiles
# 不然安装时 control 脚本会报错：
# Loading simple-cdd-profiles failed for unknown reasons
d-i preseed/early_command string true; \
    if [ -d /cdrom/simple-cdd ]; then anna-install simple-cdd-profiles; fi

# debian 11 initrd 没有 xargs awk
# debian 12 initrd 没有 xargs
# efi 分区大小未改变时，不会被格式化，因此需要手动删除旧系统的 efi 文件
# os-prober 卡太久，因此跳过
d-i partman/early_command string true; \
    eval "$(grep -o 'extra_confhome=[^ ]*' /proc/cmdline | sed 's/^extra_//')"; \

    postinst=/var/lib/dpkg/info/bootstrap-base.postinst; \
    cp $postinst $postinst.orig; \
    true >$postinst; \

    swapfile=/target/swapfile; \
    mem=$(grep ^MemTotal: /proc/meminfo | { read -r _ y _; echo "$y"; }); \
    mem=$((mem / 1024)); \
    swap_size=$((512 - mem)); \
    [ $swap_size -gt 0 ] && echo "fallocate -l ${swap_size}M $swapfile; mkswap $swapfile; swapon $swapfile" >>$postinst; \

    echo "swapoff -a; rm -f $swapfile" >/usr/lib/finish-install.d/95swapoff; \
    chmod a+x /usr/lib/finish-install.d/95swapoff; \

    echo "rm -rf /target/boot/efi/*; $postinst.orig" >>$postinst; \

    xda=$(sh /get-xda.sh); \
    debconf-set partman-auto/disk "/dev/$xda"; \
    debconf-set grub-installer/bootdev "/dev/$xda"; \
    rm -rf /usr/sbin/fdisk /usr/sbin/sfdisk; \

    ttys=$(sh /ttys.sh console=); \
    debconf-set debian-installer/add-kernel-opts "$ttys"; \

    eths=$(cd /dev/netconf/ && ls); \

    sh /can_use_cloud_kernel.sh "$xda" $eths || debconf-set base-installer/kernel/image "$(debconf-get base-installer/kernel/image | sed 's/-cloud//')"; \

    [ -d /sys/firmware/efi ] && debconf-set partman-auto/expert_recipe "$(debconf-get partman-auto/expert_recipe_efi)"; \
    [ -d /sys/firmware/efi ] || debconf-set partman-auto/expert_recipe "$(debconf-get partman-auto/expert_recipe_bios)"; \

    debconf-set passwd/root-password-crypted "$(cat /configs/password-linux-sha512)"; \

    true >/bin/os-prober

d-i preseed/late_command string true; \
    for str in $(grep -wo "extra_[^ ]*" /proc/cmdline | sed 's/^extra_//'); do eval "$str"; done; \

    if [ "$elts" = 1 ]; then sed -i "s|deb\.freexian\.com/extended-lts|$deb_mirror|" /target/etc/apt/sources.list; fi; \

    if [ "$link_grub_dir" = 1 ]; then rm -rf /target/boot/grub2; ln -s grub /target/boot/grub2; fi; \

    in-target systemctl enable ssh; \
    in-target systemctl enable systemd-timesyncd; \
    in-target systemctl mask getty@tty1.service serial-getty@ttyS0.service; \
    mkdir -p /target/etc/systemd/system/systemd-journald.service.d; \
    printf '%s\n' \
        '[Service]' \
        'ImportCredential=' \
        > /target/etc/systemd/system/systemd-journald.service.d/no-credentials.conf; \

    if [ -s /configs/ssh_keys ]; then \
        (umask 077; mkdir -p /target/root/.ssh; cat /configs/ssh_keys >/target/root/.ssh/authorized_keys); \
        in-target passwd -d root; \
    else \
        echo "PermitRootLogin yes" >/target/etc/ssh/sshd_config.d/01-permitrootlogin.conf || \
        echo "PermitRootLogin yes" >>/target/etc/ssh/sshd_config; \
    fi; \

    if [ -n "$ssh_port" ] && ! [ "$ssh_port" = 22 ]; then \
        echo "Port $ssh_port" >/target/etc/ssh/sshd_config.d/01-change-ssh-port.conf || \
        echo "Port $ssh_port" >>/target/etc/ssh/sshd_config; \
    fi; \
    if [ -n "$hostname" ]; then \
        echo "$hostname" >/target/etc/hostname; \
        tmp_hosts=/target/etc/hosts.reinstall.tmp; \
        { printf '127.0.1.1\t%s\n' "$hostname"; [ -f /target/etc/hosts ] && grep -Ev '^127\\.0\\.1\\.1[[:space:]]' /target/etc/hosts; } >"$tmp_hosts"; \
        mv "$tmp_hosts" /target/etc/hosts; \
    fi; \
    mkdir -p /target/usr/local/sbin /target/etc/systemd/system/multi-user.target.wants; \
    printf '%s\n' \
        '#!/bin/sh' \
        'fstab=/etc/fstab' \
        'tmp=${fstab}.tmp' \
        'marker_dir=/var/lib/reinstall' \
        'marker=$marker_dir/root-subvol-migration-pending' \
        'done_marker=$marker_dir/ensure-btrfs-zstd.done' \
        'top=/run/reinstall-btrfs-root' \
        'min_defrag_free=805306368' \
        'cleanup_self() {' \
        '    mkdir -p "$marker_dir"' \
        '    : >"$done_marker"' \
        '}' \
        'update_fstab() {' \
        '    awk "BEGIN { OFS=\"\t\" } /^[[:space:]]*#/ { print; next } \$2 == \"/\" && \$3 == \"btrfs\" { opts=\$4; gsub(/subvol=\\/?@rootfs/, \"subvol=/@\", opts); if (opts !~ /compress=zstd/) { opts = \"compress=zstd,\" opts } \$4=opts } { print }" "$fstab" >"$tmp"' \
        '    mv "$tmp" "$fstab"' \
        '}' \
        'mount_top_level() {' \
        '    mkdir -p "$top"' \
        '    source_dev=$(findmnt -no SOURCE / | cut -d"[" -f1)' \
        '    [ -n "$source_dev" ] || return 1' \
        '    mount -o subvolid=5 "$source_dev" "$top"' \
        '}' \
        'umount_top_level() {' \
        '    umount "$top" 2>/dev/null || true' \
        '    rmdir "$top" 2>/dev/null || true' \
        '}' \
        'patch_boot_entries() {' \
        '    for cfg in /boot/grub/grub.cfg /boot/grub2/grub.cfg /boot/extlinux/extlinux.conf /boot/extlinux.conf; do' \
        '        [ -f "$cfg" ] || continue' \
        '        sed -i -e "s#subvol=/@rootfs#subvol=/@#g" -e "s#subvol=@rootfs#subvol=/@#g" "$cfg"' \
        '    done' \
        '}' \
        'findmnt -no FSTYPE / | grep -qx btrfs || { cleanup_self; exit 0; }' \
        'update_fstab' \
        'current_subvol=$(findmnt -no OPTIONS / | tr "," "\n" | sed -n "s/^subvol=//p" | head -1)' \
        'if [ "$current_subvol" = "/@rootfs" ]; then' \
        '    command -v btrfs >/dev/null 2>&1 || { cleanup_self; exit 0; }' \
        '    mkdir -p "$marker_dir"' \
        '    mount_top_level || exit 0' \
        '    if [ ! -e "$top/@" ]; then' \
        '        btrfs subvolume snapshot / "$top/@" || { umount_top_level; exit 0; }' \
        '    fi' \
        '    patch_boot_entries' \
        '    touch "$marker"' \
        '    umount_top_level' \
        '    sync' \
        '    if command -v systemctl >/dev/null 2>&1; then systemctl --no-block reboot || true; fi' \
        '    if command -v reboot >/dev/null 2>&1; then reboot || true; fi' \
        '    exit 0' \
        'fi' \
        'mount -o remount,compress=zstd / || true' \
        'current_subvolid=$(btrfs subvolume show / 2>/dev/null | sed -n "s/^[[:space:]]*Subvolume ID:[[:space:]]*//p" | head -1)' \
        'if [ -f "$marker" ] && [ "$current_subvol" = "/@" ] && [ -z "$current_subvolid" ]; then' \
        '    exit 0' \
        'fi' \
        'if [ -f "$marker" ] && [ "$current_subvol" = "/@" ] && [ -n "$current_subvolid" ]; then' \
        '    migration_cleanup_done=0' \
        '    if mount_top_level; then' \
        '        if [ -e "$top/@" ] && [ ! -e "$top/@rootfs" ]; then' \
        '            migration_cleanup_done=1' \
        '        else' \
        '            old_root_subvolid=$(btrfs subvolume show "$top/@rootfs" 2>/dev/null | sed -n "s/^[[:space:]]*Subvolume ID:[[:space:]]*//p" | head -1)' \
        '            if [ -e "$top/@" ] && [ -e "$top/@rootfs" ] && [ -n "$old_root_subvolid" ] && [ "$old_root_subvolid" != "$current_subvolid" ] && btrfs subvolume delete "$top/@rootfs"; then' \
        '                migration_cleanup_done=1' \
        '            fi' \
        '        fi' \
        '        umount_top_level' \
        '    fi' \
        '    if [ "$migration_cleanup_done" = 1 ]; then' \
        '        rm -f "$marker"' \
        '        if command -v update-grub >/dev/null 2>&1; then update-grub || true; fi' \
        '    else' \
        '        exit 0' \
        '    fi' \
        'fi' \
        'command -v btrfs >/dev/null 2>&1 || { cleanup_self; exit 0; }' \
        'avail_bytes=$(df -B1 --output=avail / | tail -1 | tr -d " ")' \
        'case "$avail_bytes" in ""|*[!0-9]*) avail_bytes=0 ;; esac' \
        'if [ "$avail_bytes" -ge "$min_defrag_free" ]; then' \
        '    for path in /boot /etc /opt /root /srv /usr /var; do' \
        '        [ -e "$path" ] && btrfs filesystem defragment -r -czstd "$path" || true' \
        '    done' \
        '    btrfs balance start -dusage=50 -musage=50 / || true' \
        'fi' \
        'cleanup_self' \
        > /target/usr/local/sbin/ensure-btrfs-zstd.sh; \
    chmod a+x /target/usr/local/sbin/ensure-btrfs-zstd.sh; \
    printf '%s\n' \
        '[Unit]' \
        'Description=Ensure btrfs zstd compression for root' \
        'ConditionPathExists=!/var/lib/reinstall/ensure-btrfs-zstd.done' \
        'After=local-fs.target' \
        'Before=ssh.service networking.service multi-user.target' \
        '[Service]' \
        'Type=oneshot' \
        'ExecStart=/usr/local/sbin/ensure-btrfs-zstd.sh' \
        '[Install]' \
        'WantedBy=multi-user.target' \
        > /target/etc/systemd/system/ensure-btrfs-zstd.service; \
    ln -sf /etc/systemd/system/ensure-btrfs-zstd.service /target/etc/systemd/system/multi-user.target.wants/ensure-btrfs-zstd.service; \

    cp /fix-eth-name.sh /target/; \
    cp /fix-eth-name.service /target/etc/systemd/system/; \
    in-target systemctl enable fix-eth-name
